{% extends "base.html" %}
{% block title %}{{ '编辑' if sku and sku.id else '新增' }}SKU - WMS{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-box me-2"></i>{{ '编辑' if sku and sku.id else '新增' }}物料/SKU</h2>
</div>

<div class="card p-4" style="max-width: 720px;">
    {% if error %}
    <div class="alert alert-danger alert-dismissible fade show" style="border-radius:12px; margin-bottom:20px;">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    <form method="post">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">名称 <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" value="{{ sku.name if sku else '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">分类</label>
                <input type="text" name="category" class="form-control" value="{{ sku.category if sku else '' }}">
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">规格</label>
                <input type="text" name="spec" class="form-control" value="{{ sku.spec if sku else '' }}">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">单位</label>
                <input type="text" name="unit" class="form-control" value="{{ sku.unit if sku else '件' }}">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">条码</label>
                <input type="text" name="barcode" class="form-control" value="{{ sku.barcode if sku else '' }}">
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">效期（天）</label>
                <input type="number" name="shelf_life_days" class="form-control" value="{{ sku.shelf_life_days if sku else '' }}" placeholder="如 365">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">ABC分类</label>
                <select name="abc_class" class="form-select">
                    {% for c in abc_classes %}<option value="{{ c }}" {% if sku and sku.abc_class==c %}selected{% endif %}>{{ c }}类</option>{% endfor %}
                </select>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">安全库存</label>
                <input type="number" name="safety_stock" class="form-control" value="{{ sku.safety_stock if sku else '0' }}" step="0.1">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">最大库存</label>
            <input type="number" name="max_stock" class="form-control" value="{{ sku.max_stock if sku else '0' }}" step="0.1">
        </div>
        <div class="mb-3">
            <label class="form-label">备注</label>
            <textarea name="remark" class="form-control" rows="2">{{ sku.remark if sku else '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="/sku" class="btn btn-outline-secondary ms-2">取消</a>
    </form>
</div>
{% endblock %}

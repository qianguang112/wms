{% extends "base.html" %}
{% block title %}{{ '编辑' if partner and partner.id else '新增' }}往来单位 - WMS{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-people me-2"></i>{{ '编辑' if partner and partner.id else '新增' }}往来单位</h2>
</div>

<div class="card p-4" style="max-width: 640px;">
    {% if error %}
    <div class="alert alert-danger alert-dismissible fade show" style="border-radius:12px; margin-bottom:20px;">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    <form method="post">
        <div class="mb-3">
            <label class="form-label">名称 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ partner.name if partner else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">类型</label>
            <select name="partner_type" class="form-select">
                {% for t in partner_types %}<option value="{{ t }}" {% if partner and partner.partner_type==t %}selected{% endif %}>{{ partner_type_labels[t] }}</option>{% endfor %}
            </select>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">联系人</label>
                <input type="text" name="contact_person" class="form-control" value="{{ partner.contact_person if partner else '' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">联系电话</label>
                <input type="text" name="contact_phone" class="form-control" value="{{ partner.contact_phone if partner else '' }}">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">地址</label>
            <input type="text" name="address" class="form-control" value="{{ partner.address if partner else '' }}">
        </div>
        <div class="mb-3">
            <label class="form-label">备注</label>
            <textarea name="remark" class="form-control" rows="2">{{ partner.remark if partner else '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="/partner" class="btn btn-outline-secondary ms-2">取消</a>
    </form>
</div>
{% endblock %}

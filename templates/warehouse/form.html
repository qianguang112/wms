{% extends "base.html" %}
{% block title %}{{ '编辑' if warehouse and warehouse.id else '新增' }}仓库 - WMS{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-geo-alt me-2"></i>{{ '编辑' if warehouse and warehouse.id else '新增' }}仓库</h2>
</div>

<div class="card p-4" style="max-width: 640px;">
    {% if error %}
    <div class="alert alert-danger alert-dismissible fade show" style="border-radius:12px; margin-bottom:20px;">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    <form method="post">
        <div class="mb-3">
            <label class="form-label">仓库名称 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ warehouse.name if warehouse else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">地址</label>
            <input type="text" name="address" class="form-control" value="{{ warehouse.address if warehouse else '' }}">
        </div>
        <div class="mb-3">
            <label class="form-label">负责人</label>
            <input type="text" name="manager" class="form-control" value="{{ warehouse.manager if warehouse else '' }}">
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="/warehouse" class="btn btn-outline-secondary ms-2">取消</a>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}新建盘点计划 - WMS{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-clipboard-check me-2"></i>新建盘点计划</h2>
</div>

<div class="card p-4" style="max-width: 640px;">
    <form method="post">
        <div class="mb-3">
            <label class="form-label">仓库 <span class="text-danger">*</span></label>
            <select name="warehouse_id" class="form-select" required onchange="loadAreas(this.value)">
                <option value="">选择仓库...</option>
                {% for w in warehouses %}<option value="{{ w.id }}">{{ w.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">库区（留空盘点整个仓库）</label>
            <select name="area_id" id="areaSelect" class="form-select">
                <option value="">全部库区</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">盘点类型</label>
            <select name="count_type" class="form-select">
                {% for t, label in count_type_labels.items() %}
                <option value="{{ t }}">{{ label }}</option>
                {% endfor %}
            </select>
            <div class="form-text">明盘：显示系统数量 / 盲盘：不显示系统数量 / 循环盘：按周期 / 动碰盘：有出入库的库位优先</div>
        </div>
        <div class="mb-3">
            <label class="form-label">操作人</label>
            <input type="text" name="created_by" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">创建盘点计划</button>
        <a href="/internal" class="btn btn-outline-secondary ms-2">取消</a>
    </form>
</div>
{% endblock %}
